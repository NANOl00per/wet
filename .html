<style>
  :root{ --w:420px; --h:420px; --r:18px; }
  *{ box-sizing:border-box }
  html,body{ height:100%; margin:0; background:#0a0e19 }
  .frame{
    width:var(--w); height:var(--h); margin:24px auto; position:relative; overflow:hidden; border-radius:var(--r);
    border:2px solid rgba(180,200,255,.15);
    background:radial-gradient(120% 80% at 50% 20%, #111b2b, #070b13 60%, #05070c 100%);
    box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 40px rgba(80,120,255,.08);
  }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block }
  .tag{ position:absolute; left:12px; bottom:10px; color:rgba(200,220,255,.35); font:700 10px system-ui; letter-spacing:1.5px; z-index:6 }
  #tap{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#dfe8ff; cursor:pointer;
        background:linear-gradient(to bottom, rgba(10,14,25,.25), rgba(10,14,25,.55)); font:600 13px system-ui; z-index:7 }
  #tap .pill{ padding:10px 14px; border-radius:12px; background:rgba(255,255,255,.06); border:1px solid rgba(205,220,255,.18) }
  #mute{ position:absolute; right:10px; bottom:10px; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;
         background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); color:#dfe8ff; font-size:18px; cursor:pointer; z-index:6 }

  .orbwrap{ position:absolute; top:10px; right:10px; z-index:6; width:130px; height:130px; pointer-events:auto }
  #orbBack{ position:absolute; inset:0; border-radius:50%; pointer-events:none; z-index:0 }
  .orbFace{ position:absolute; inset:0; border-radius:50%; z-index:2; pointer-events:none;
    background:
      radial-gradient(120% 90% at 40% 30%, rgba(160,200,255,.22), rgba(80,120,200,.08) 40%, rgba(0,0,0,0) 60%),
      radial-gradient(120% 90% at 60% 70%, rgba(255,255,255,.06), rgba(0,0,0,0) 60%);
    box-shadow:
      0 10px 20px rgba(0,0,0,.55),
      inset 0 0 20px rgba(120,160,255,.25),
      inset 0 0 60px rgba(80,120,255,.08);
  }
  .orbitDot{ position:absolute; width:10px; height:10px; border-radius:50%;
             background:#5cabff; border:2px solid #e6f2ff; box-shadow:0 0 8px rgba(90,170,255,.85), 0 0 0 2px #0006;
             cursor:grab; z-index:3; touch-action:none; }
</style>

<body>
  <div class="frame" id="wet">
    <canvas id="bg"></canvas>
    <canvas id="rain"></canvas>

    <div class="orbwrap" id="orbwrap">
      <canvas id="orbBack" width="130" height="130"></canvas>
      <div class="orbFace"></div>
      <div class="orbitDot" id="orbit" title="Volume"></div>
    </div>

    <div id="tap"><div class="pill">Tap to start WET</div></div>
    <div id="mute" title="Mute/Unmute">🔈</div>
    <div class="tag">WET</div>
  </div>
<script>
(()=>{
  const DPR = Math.min(devicePixelRatio||1,2);
  const $=id=>document.getElementById(id);
  const frame=$('wet'), bg=$('bg'), rain=$('rain');
  const ctxB=bg.getContext('2d'), ctxR=rain.getContext('2d');
  let W=0,H=0; function resize(){ const r=frame.getBoundingClientRect(); W=(r.width*DPR)|0; H=(r.height*DPR)|0; [bg,rain].forEach(c=>{c.width=W;c.height=H;}); }
  window.addEventListener('resize',resize,{passive:true}); resize();

  // Background + clouds
  const clouds=[]; function mkCloud(i){ const y=0.12*H+Math.random()*0.6*H, w=(0.6+Math.random()*0.8)*W, h=(0.12+Math.random()*0.14)*H;
    return {x:-w-Math.random()*W*0.5,y,w,h,a:0.05+Math.random()*0.08,sp:(0.015+Math.random()*0.035)*DPR,seed:i}; }
  for(let i=0;i<5;i++) clouds.push(mkCloud(i));
  function drawCloud(c){ ctxB.save(); ctxB.globalAlpha=c.a; ctxB.fillStyle='rgba(180,200,255,1)'; ctxB.beginPath();
    for(let i=0;i<6;i++){ const ox=c.x+(i/6)*c.w, oy=c.y; ctxB.ellipse(ox,oy,c.h*(1.0+(i%2?0.2:0))*1.08,c.h*(0.65+(i%3?0.15:0))*0.9,0,0,6.283); } ctxB.fill(); ctxB.restore(); }
  function drawBG(dt){ ctxB.clearRect(0,0,W,H); const g=ctxB.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0b1320'); g.addColorStop(0.6,'#0a111c'); g.addColorStop(1,'#070b13'); ctxB.fillStyle=g; ctxB.fillRect(0,0,W,H);
    for(const c of clouds){ c.x+=c.sp*dt; if(c.x>W+c.w*0.5){ Object.assign(c,mkCloud(c.seed)); c.x=-c.w-Math.random()*W*0.3; } drawCloud(c); } }

  // Rain
  const drops=[]; function newDrop(){ return {x:Math.random()*W,y:-Math.random()*H*0.2,len:(8+Math.random()*14)*DPR,vy:(0.35+Math.random()*0.7)*DPR,th:(0.6+Math.random()*0.9)*DPR,a:0.14+Math.random()*0.1}; }
  function ensure(){ const n=Math.max(150,(W*H*0.0014)|0); while(drops.length<n)drops.push(newDrop()); } ensure();
  function drawRain(dt){ ctxR.clearRect(0,0,W,H); ctxR.strokeStyle='#bcd4ff'; ctxR.lineCap='round';
    for(const d of drops){ d.y+=d.vy*dt; ctxR.globalAlpha=d.a; ctxR.lineWidth=d.th; ctxR.beginPath(); ctxR.moveTo(d.x,d.y); ctxR.lineTo(d.x,d.y-d.len); ctxR.stroke();
      if(d.y>H){ Object.assign(d,newDrop()); d.y=-Math.random()*H*0.15; } } }

  // Orb visuals
  const orbBack=$('orbBack'), octx=orbBack.getContext('2d');
  const ring={ r:46, drift:6, wobble:2, speed:0.0008, cx:65, cy:68, theta:0 };
  const moons=[ '#5fe694','#ffb84d','#ff4d4f','#ff74c1','#5cabff' ].map((color,i)=>({angle:60+i*60, rad:16+i*2, dir:i%2?1:-1, color}));
  const parts=[]; for(let i=0;i<24;i++) parts.push({ x:Math.random()*130, y:Math.random()*130, vx:(Math.random()*0.28-0.14), vy:(0.10+Math.random()*0.22), size:2+Math.random()*3, rot:Math.random()*6.283, vr:(Math.random()*0.02-0.01), alpha:0.3+Math.random()*0.25, hue:190+Math.random()*60 });
  function drawOrb(now,dt){
    const W2=130,H2=130; octx.clearRect(0,0,W2,H2);
    for(const s of parts){ s.x+=s.vx; s.y+=s.vy*0.6; s.rot+=s.vr; if(s.y>H2+10){ s.y=-10; s.x=Math.random()*W2; } if(s.x<-10) s.x=W2+10; if(s.x>W2+10) s.x=-10;
      octx.save(); octx.translate(s.x,s.y); octx.rotate(s.rot); octx.globalAlpha=s.alpha; octx.fillStyle=`hsl(${s.hue},70%,60%)`;
      octx.beginPath(); octx.moveTo(0,-s.size); octx.lineTo(s.size*0.6,0); octx.lineTo(0,s.size); octx.lineTo(-s.size*0.6,0); octx.closePath(); octx.fill(); octx.restore(); }
    ring.theta += dt*0.00012;
    ring.cx = 65 + Math.sin(now*ring.speed*1.1)*ring.drift;
    ring.cy = 68 + Math.sin(now*ring.speed*0.9+1.2)*ring.drift*0.7;
    const R = ring.r + Math.sin(now*ring.speed*3.2)*ring.wobble;
    for(const m of moons){
      m.angle = (m.angle + m.dir*dt*0.01) % 360;
      const a=(m.angle*Math.PI/180), x= ring.cx + Math.cos(a)*(m.rad + 18), y= ring.cy + Math.sin(a)*(m.rad + 18);
      octx.save(); octx.shadowBlur=8; octx.shadowColor=m.color; octx.globalAlpha=0.9; octx.fillStyle=m.color;
      octx.beginPath(); octx.arc(x,y,5,0,Math.PI*2); octx.fill(); octx.restore();
    }
    octx.save(); octx.shadowBlur=8; octx.shadowColor='rgba(90,170,255,0.5)'; octx.strokeStyle='rgba(41,171,226,0.42)'; octx.lineWidth=2;
    octx.beginPath(); octx.arc(ring.cx, ring.cy, R, 0, Math.PI*2); octx.stroke(); octx.restore();
  }

  // Moving + draggable volume dot (auto orbits visually; volume changes only on drag)
  (function(){
    const orbit=$('orbit');
    let volAngle=300; let autoAngle=volAngle; let dragging=false;
    function place(deg){ const r=$('orbwrap').getBoundingClientRect(); const R=Math.min(r.width,r.height)/2-26; const cx=r.width/2, cy=r.height/2; const a=deg*Math.PI/180;
      orbit.style.left=(cx+Math.cos(a)*R-5)+'px'; orbit.style.top=(cy+Math.sin(a)*R-5)+'px'; }
    place(volAngle);
    function setFromAngle(){ if(!master) return; const norm=((volAngle+45)%360)/360; const target=0.05+0.95*norm; master.gain.setTargetAtTime(target, ac.currentTime, 0.06); }
    function angleFrom(e){ const r=$('orbwrap').getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
      const x=('touches' in e && e.touches.length? e.touches[0].clientX : e.clientX);
      const y=('touches' in e && e.touches.length? e.touches[0].clientY : e.clientY);
      let deg=Math.atan2(y-cy, x-cx)*180/Math.PI; if(deg<0) deg+=360; return deg; }
    function down(e){ dragging=true; e.preventDefault(); }
    function move(e){ if(!dragging) return; const deg=angleFrom(e); const delta=((deg - volAngle + 540)%360)-180; volAngle=(volAngle + delta*0.28 + 360)%360; place(volAngle); autoAngle=volAngle; setFromAngle(); }
    function up(){ dragging=false; }
    orbit.addEventListener('mousedown', down); window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    orbit.addEventListener('touchstart', down, {passive:false}); window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
    // auto orbit step (visual only)
    window.__WET__={autoStep:(dt)=>{ if(dragging) return; autoAngle=(autoAngle+(12/1000)*dt)%360; const diff=((autoAngle-volAngle+540)%360)-180; volAngle=(volAngle+diff*0.05+360)%360; place(volAngle); }};
  })();

  // Audio (embedded)
  const EMBED_MP3_B64 = "/* [omitted: base64 MP3 data, ~31,000,000 characters] */";
  const tap=$('tap'), mute=$('mute');
  let ac=null, master=null, audioBuf=null, source=null, currentVol=0.25;
  function b64ToArrBuf(b64){ const bin=atob(b64), len=bin.length, bytes=new Uint8Array(len); for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i); return bytes.buffer; }
  async function startAudio(){ if(ac) return;
    ac=new (window.AudioContext||window.webkitAudioContext)(); master=ac.createGain(); master.gain.value=0.0; master.connect(ac.destination);
    const arr=b64ToArrBuf(EMBED_MP3_B64); try{ audioBuf=await ac.decodeAudioData(arr); }catch(e){ console.error('decode failed', e); return; }
    source=ac.createBufferSource(); source.buffer=audioBuf; source.loop=true; source.connect(master); source.start();
    const now=ac.currentTime; master.gain.setValueAtTime(0.0, now); master.gain.linearRampToValueAtTime(currentVol, now+4.0);
    tap.style.display='none';
  }
  function resumeIfNeeded(){ if(ac && ac.state!=='running') ac.resume(); }
  ['pointerdown','touchstart','keydown','wheel'].forEach(ev=> window.addEventListener(ev, resumeIfNeeded, {passive:true}));

  mute.onclick=()=>{ if(!master) return; const to=(master.gain.value>0.0001)?0.0:currentVol; master.gain.setTargetAtTime(to, ac.currentTime, 0.08); mute.textContent=(to===0.0)?'🔇':'🔈'; };

  // Main loop
  let last=performance.now();
  function tick(now){ const dt=Math.min(32, now-last); last=now; drawBG(dt); drawRain(dt); drawOrb(now,dt); if(window.__WET__) window.__WET__.autoStep(dt); requestAnimationFrame(tick); }
  requestAnimationFrame(tick);

  tap.onclick=()=> startAudio();
})();
</script>

<style>
  html, body { overflow: hidden; }
  #wetBtn{position:fixed;top:10px;left:10px;width:64px;height:64px;display:grid;place-items:center;user-select:none;cursor:pointer;-webkit-tap-highlight-color:transparent;border:0;background:none;z-index:99998;}

  #gearBtn{position:fixed;top:10px;left:84px;width:32px;height:32px;display:grid;place-items:center;user-select:none;cursor:pointer;-webkit-tap-highlight-color:transparent;border:1px solid #1a2743;background:#0f1d39;color:#e9f0ff;border-radius:8px;z-index:99998}

<button id="wetBtn" aria-pressed="false" aria-label="Play / Pause">
  <svg viewBox="0 0 64 64" aria-hidden="true">
    <path class="drop-fill" d="M32 6 C27 16,16 26,16 38 a16 16 0 0 0 32 0 C48 26,37 16,32 6z" fill="#3aa0ff"/>
    <path class="drop-outline" d="M32 6 C27 16,16 26,16 38 a16 16 0 0 0 32 0 C48 26,37 16,32 6z" fill="none" stroke="#1a2743" stroke-width="2"/>

<div id="panel" role="dialog" aria-modal="false">
  <div class="row" style="margin-bottom:8px">
    <input id="url" class="txt" placeholder="Paste MP3 / Dropbox / Drive / GitHub / pCloud URL">
    <button id="load" class="btn">Load & Play</button>
    <button id="close" class="btn" title="Close">✕</button>
  </div>
  <div class="help">Known share links auto-convert to direct file URLs. Works great with Catbox.</div>
  <div id="srcLine" title="Current source"></div>
</div>

<div id="err" role="status" aria-live="polite"></div>

<script>
(function(){
  const DEFAULT = "https://files.catbox.moe/tvegaj.mp3";

  const btn = document.getElementById('wetBtn');
  const icon = document.getElementById('wetIcon');
  const gear = document.getElementById('gearBtn');
  const panel = document.getElementById('panel');
  const urlInput = document.getElementById('url');
  const loadBtn = document.getElementById('load');
  const closeBtn = document.getElementById('close');
  const srcLine = document.getElementById('srcLine');
  const err = document.getElementById('err');

  const audio = new Audio();
  audio.preload = "auto";
  audio.crossOrigin = "anonymous";
  audio.playsInline = true;
  audio.setAttribute('referrerpolicy','no-referrer');

  function toDirect(u){
    if(!u) return "";
    u = u.trim();
    if (u.includes("dropbox.com/")) {
      const m = u.match(/dropbox\.com\/s\/([^?]+)/);
      if (m) return "https://dl.dropboxusercontent.com/s/" + m[1];
    }
    if (u.includes("drive.google.com")) {
      let id = (u.match(/\/file\/d\/([^/]+)/)||[])[1] || (u.match(/[?&]id=([^&]+)/)||[])[1];
      if (id) return "https://drive.google.com/uc?export=download&id=" + id;
    }
    if (u.includes("github.com") && u.includes("/blob/")) {
      try {
        const url = new URL(u);
        const p = url.pathname.split("/").filter(Boolean);
        if (p[2] === "blob") return "https://raw.githubusercontent.com/" + p[0] + "/" + p[1] + "/" + p[3] + "/" + p.slice(4).join("/");
      } catch(_){}
    }
    return u;
  }

  function setSrc(u){
    const s = toDirect(u) || DEFAULT;
    audio.src = s;
    srcLine.textContent = "Source: " + s;
    err.style.display = "none";
  }

  let playing = false;
  function ui(on){
    btn.classList.toggle('is-playing', on);
    btn.setAttribute('aria-pressed', String(on));
    icon.setAttribute('points', on ? '28,26 28,42 32,42 32,26 38,26 38,42 42,42 42,26' : '28,26 28,42 42,34');
  }

  async function togglePlay(){
    try{
      if (!playing) { audio.load(); await audio.play(); playing = true; }
      else { audio.pause(); playing = false; }
      ui(playing);
    } catch(e){ showErr(e); }
  }

  function showErr(e){
    const msg = "Playback failed. readyState=" + audio.readyState + " networkState=" + audio.networkState + (e ? " — " + (e.message || e.name) : "");
    err.textContent = msg;
    err.style.display = "block";
    setTimeout(() => { err.style.display = "none"; }, 6000);
  }

  let retryTimer=null;
  function retry(){
    clearTimeout(retryTimer);
    retryTimer = setTimeout(() => { if(!audio.paused) audio.play().catch(()=>{}); }, 800);
  }
  audio.addEventListener('stalled', retry);
  audio.addEventListener('suspend', retry);

  btn.addEventListener('click', togglePlay);
  gear.addEventListener('click', () => { panel.style.display = (panel.style.display === "block" ? "none" : "block"); });
  closeBtn.addEventListener('click', () => { panel.style.display = "none"; });
  loadBtn.addEventListener('click', async () => {
    setSrc(urlInput.value);
    try { await audio.play(); playing = true; ui(true); }
    catch(e) { showErr(e); }
  });

  audio.addEventListener('ended', () => { playing=false; ui(false); });
  audio.addEventListener('pause', () => { playing=false; ui(false); });
  audio.addEventListener('play', () => { playing=true; ui(true); });
  audio.addEventListener('error', () => { showErr(new Error("audio error")); });

  // Init: keep WET visible; only set src
  try {
    const qp = new URLSearchParams(location.search);
    setSrc(qp.get("u") || DEFAULT);
  } catch(_) {
    setSrc(DEFAULT);
  }
})();
</script>
<!-- /WET Overlay -->

<script>
(function(){
  const containerSelectors = ['#wet-frame','.wet-frame','#app','#root','main','#__next'];
  let host = null;
  for (const sel of containerSelectors){
    const el = document.querySelector(sel);
    if (el){ host = el; break; }
  }
  if (!host) host = document.body;

  // ensure host is positioned
  const cs = getComputedStyle(host);
  if (!cs.position || cs.position === 'static') host.style.position = 'relative';

  // build a centered HUD wrapper
  let hud = document.getElementById('wetHUDcenter');
  if (!hud){
    hud = document.createElement('div');
    hud.id = 'wetHUDcenter';
  }

  // move existing controls into the HUD
  const wetBtn = document.getElementById('wetBtn');
  const gearBtn = document.getElementById('gearBtn');
  if (wetBtn) hud.appendChild(wetBtn);
  if (gearBtn) hud.appendChild(gearBtn);

  // attach panel just under HUD inside host (if exists)
  const panel = document.getElementById('panel');
  if (panel){
    panel.style.position = 'absolute';
    panel.style.top = '56px';
    panel.style.left = '50%';
    panel.style.transform = 'translateX(-50%)';
    panel.style.zIndex = '160';
    host.appendChild(panel);
  }

  // add HUD to host
  host.appendChild(hud);

  // dial down any full-page overlay to avoid covering core UI
  const overlay = document.getElementById('wetOverlayAnchor');
  if (overlay && overlay.parentElement !== host){
    overlay.style.position = 'absolute';
    overlay.style.inset = '0';
    overlay.style.zIndex = '90';
    host.appendChild(overlay);
  }
})();
</script>

<script id="wet-pinned-js">
(function(){
  function $(s,r=document){ return r.querySelector(s); }
  function $$ (s,r=document){ return Array.from(r.querySelectorAll(s)); }
  function R(el){ return el.getBoundingClientRect(); }
  function pickFrame(){
    const nodes = $$('div,section,main').filter(el=>{
      const cs=getComputedStyle(el), r=R(el);
      const rad=Math.max(parseFloat(cs.borderTopLeftRadius)||0, parseFloat(cs.borderBottomRightRadius)||0);
      return r.width*r.height>120000 && rad>=8;
    }).sort((a,b)=> (R(b).width*R(b).height)-(R(a).width*R(a).height));
    return nodes[0]||document.body;
  }
  function ensureRel(el){ if(getComputedStyle(el).position==='static'){ el.style.position='relative'; } }

  function init(){
    const fr = pickFrame(); ensureRel(fr);
    const wet  = document.getElementById('wetBtn')  || $('[data-wet-btn],#dropBtn,button[aria-label*="play" i],button[title*="play" i]');
    const gear = document.getElementById('gearBtn') || $('[data-gear-btn],#settingsBtn,button[aria-label*="settings" i],button[title*="settings" i]');
    if(!wet && !gear) return;
    let bar = $('.wetPinnedBar'); if(!bar){ bar = document.createElement('div'); bar.className='wetPinnedBar'; fr.appendChild(bar); }
    [wet,gear].forEach(btn=>{
      if(!btn) return;
      btn.style.position='static';
      btn.style.zIndex='2147483600';
      btn.style.pointerEvents='auto';
      btn.style.opacity='1';
      btn.style.visibility='visible';
      bar.appendChild(btn);
    });
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init, {once:true}); } else { init(); }
})();
</script>


<script id="wet-v1b-js">
(function(){
  const KEY_LIST='wet_playlist';
  const KEY_IDX ='wet_playlist_idx';
  const KEY_PAT ='wet_url_pattern';
  const MAX_ITEMS=50000;

  const $=(s,r=document)=>r.querySelector(s);
  const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));

  function findLoadButton(){
    return $$('button').find(b=>/load\s*&\s*play/i.test(b.textContent||'')) || null;
  }
  function findUrlInput(){
    return $$('input[type="url"],input[type="text"],textarea').find(el=>{
      const s=(el.placeholder||'')+(el.value||'')+el.outerHTML;
      return /catbox|dropbox|http|https|\.mp3|\.wav|\.m4a/i.test(s);
    }) || null;
  }
  function findAudio(){ return $('audio') || null; }

  function loadList(){ try{ return JSON.parse(localStorage.getItem(KEY_LIST)||'[]'); }catch(_){ return []; } }
  function saveList(a){ try{ localStorage.setItem(KEY_LIST, JSON.stringify(a.slice(0,MAX_ITEMS))); }catch(_){ } }
  function getIdx(){ const n=parseInt(localStorage.getItem(KEY_IDX)||'0',10); return isNaN(n)?0:n; }
  function setIdx(i){ try{ localStorage.setItem(KEY_IDX, String(i)); }catch(_){ } }

  function savePattern(head, ext){ try{ localStorage.setItem(KEY_PAT, JSON.stringify({head, ext})); }catch(_){} }
  function loadPattern(){ try{ const o=JSON.parse(localStorage.getItem(KEY_PAT)||'null'); if(o&&o.head&&o.ext) return o; }catch(_){ } return null; }

  function isURL(v){ return /^https?:\/\//i.test(v||''); }
  function isShortCode(v){ return /^[A-Za-z0-9_-]{2,32}$/.test((v||'').trim()); }
  function buildURLFromCode(code){ const p=loadPattern(); return p? (p.head+code+p.ext) : null; }

  function inferPattern(url){
    try{
      const u = new URL(url);
      const file = u.pathname.split('/').pop();
      const dot  = file.lastIndexOf('.');
      if(dot>0){
        const ext=file.slice(dot);
        const head=url.slice(0, url.lastIndexOf('/')+1);
        return {head, ext};
      }
    }catch(_){}
    return null;
  }

  function decorateLoadButton(btn){
    if(btn.classList.contains('wet-load-btn')) return {btn, left:btn.querySelector('.wet-arr.l'), right:btn.querySelector('.wet-arr.r')};
    btn.classList.add('wet-load-btn');
    const left=document.createElement('span'); left.className='wet-arr l'; left.textContent='‹';
    const right=document.createElement('span'); right.className='wet-arr r'; right.textContent='›';
    btn.insertBefore(left, btn.firstChild);
    btn.appendChild(right);
    return {btn,left,right};
  }

  function ensureTimerBelow(btn){
    let t = document.getElementById('wetTimerLine');
    if(!t){
      t = document.createElement('div');
      t.id='wetTimerLine'; t.className='wet-timer'; t.textContent='';
      btn.parentElement.insertBefore(t, btn.nextSibling);
    }
    return t;
  }

  function fmt(s){
    if(!isFinite(s) || s<0) s=0;
    const m = Math.floor(s/60);
    const ss = Math.floor(s%60);
    return m + ':' + (ss<10?'0'+ss:ss);
  }

  async function playURL(url){
    const input = findUrlInput();
    const loadBtn = findLoadButton();
    const audio = findAudio();
    let finalURL = url;
    if(!isURL(url) && isShortCode(url)){
      const built = buildURLFromCode(url);
      if(built) finalURL = built;
    }
    if(input && loadBtn){
      input.value = finalURL;
      input.dispatchEvent(new Event('input', {bubbles:true}));
      input.dispatchEvent(new Event('change', {bubbles:true}));
      loadBtn.click();
    } else if(audio){
      audio.src = finalURL;
      try{ await audio.play(); }catch(_){}
    }
  }

  function addToPlaylist(url){
    const list=loadList();
    if(!list.some(x=>x.url===url)){
      list.unshift({url, title: url.split('/').pop()});
      saveList(list);
      setIdx(0);
    }
  }

  function go(dir){
    const list=loadList();
    if(!list.length) return;
    let i=getIdx();
    i = (i + dir + list.length) % list.length;
    setIdx(i);
    playURL(list[i].url);
  }

  function hookEverything(){
    const btn = findLoadButton();
    const input = findUrlInput();
    if(!btn) return;

    const deco = decorateLoadButton(btn);
    const timer = ensureTimerBelow(btn);

    btn.addEventListener('click', ()=>{
      const val = input && input.value ? input.value.trim() : '';
      let finalURL = val;
      if(isURL(val)){
        const pat = inferPattern(val);
        if(pat) savePattern(pat.head, pat.ext);
      } else if(isShortCode(val)){
        const built = buildURLFromCode(val);
        if(built) finalURL = built;
      }
      if(finalURL){
        addToPlaylist(finalURL);
      }
    }, {capture:true});

    if(deco && deco.left){ deco.left.addEventListener('click', (e)=>{ e.stopPropagation(); go(-1); }, {capture:true}); }
    if(deco && deco.right){ deco.right.addEventListener('click', (e)=>{ e.stopPropagation(); go(+1); }, {capture:true}); }

    const audio = findAudio();
    if(audio){
      function updateTime(){
        if(!isFinite(audio.duration) || audio.duration<=0){
          timer.textContent = '▶ ' + fmt(audio.currentTime) + ' / --:--';
        } else {
          timer.textContent = '▶ ' + fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
        }
      }
      audio.addEventListener('timeupdate', ()=>{ updateTime(); timer.classList.add('playing'); });
      audio.addEventListener('play',       ()=>{ updateTime(); timer.classList.add('playing'); });
      audio.addEventListener('pause',      ()=>{ updateTime(); timer.classList.remove('playing'); });
      audio.addEventListener('ended',      ()=>{ updateTime(); timer.classList.remove('playing'); });
    }
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', hookEverything, {once:true});
  } else {
    hookEverything();
  }
})();
</script>
