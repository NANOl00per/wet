
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  html {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
  }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    width: 320px;
    height: 480px;
    overflow: hidden;
    user-select: none;
  }

  #header {
    background: #111118;
    border-bottom: 1px solid #222233;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
  }

  #header .title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #6c63ff;
    text-transform: uppercase;
  }

  #controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  #controls button {
    background: #1e1e2e;
    border: 1px solid #333350;
    color: #aaaacc;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #controls button:hover { background: #2a2a40; color: #fff; }
  #controls button.active { background: #6c63ff; border-color: #6c63ff; color: #fff; }

  #speed-label {
    font-size: 9px;
    color: #555570;
  }

  #feed {
    height: calc(480px - 36px - 28px);
    overflow: hidden;
    position: relative;
  }

  #feed-inner {
    position: absolute;
    width: 100%;
    transition: transform 0.6s ease;
  }

  .card {
    width: 100%;
    height: calc(480px - 36px - 28px);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.4);
  }

  .card-content {
    position: relative;
    z-index: 1;
    padding: 14px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .card-brand {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6c63ff;
    margin-bottom: 6px;
  }

  .card-embed {
    flex: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #333350;
    background: #0d0d18;
  }

  .card-embed iframe {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
  }

  .card-label {
    margin-top: 8px;
    font-size: 11px;
    color: #aaaacc;
    line-height: 1.4;
  }

  .card-tag {
    display: inline-block;
    margin-top: 4px;
    font-size: 9px;
    background: #1e1e2e;
    border: 1px solid #333350;
    border-radius: 3px;
    padding: 2px 6px;
    color: #6c63ff;
  }

  #statusbar {
    height: 28px;
    background: #0d0d18;
    border-top: 1px solid #1a1a2a;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
  }

  .dots {
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #333350;
    cursor: pointer;
    transition: background 0.2s;
  }

  .dot.active { background: #6c63ff; }

  #timer-bar {
    flex: 1;
    height: 2px;
    background: #1a1a2a;
    border-radius: 1px;
    overflow: hidden;
  }

  #timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #6c63ff, #a78bfa);
    width: 0%;
    transition: width linear;
  }

  #counter {
    font-size: 9px;
    color: #444460;
    min-width: 30px;
    text-align: right;
  }

  /* Manage panel */
  #manage-panel {
    display: none;
    position: absolute;
    inset: 36px 0 28px 0;
    background: #0d0d18;
    z-index: 10;
    padding: 10px;
    overflow-y: auto;
  }

  #manage-panel.open { display: block; }

  #manage-panel h3 {
    font-size: 10px;
    color: #6c63ff;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .channel-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a2a;
  }

  .channel-row label {
    font-size: 11px;
    flex: 1;
    color: #cccce0;
  }

  .channel-row span {
    font-size: 9px;
    color: #555570;
  }

  .toggle {
    width: 28px;
    height: 16px;
    background: #1e1e2e;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    border: 1px solid #333350;
    transition: background 0.2s;
  }

  .toggle.on { background: #6c63ff; border-color: #6c63ff; }

  .toggle::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 14px; }

  #add-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }

  #add-url {
    flex: 1;
    background: #1e1e2e;
    border: 1px solid #333350;
    border-radius: 4px;
    color: #e0e0e8;
    font-size: 10px;
    padding: 4px 7px;
  }

  #add-btn {
    background: #6c63ff;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
  }

/* Premium additions */
body::before{content:"";position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,#6c63ff22,transparent 35%),
radial-gradient(circle at 80% 70%,#a855f722,transparent 35%);
filter:blur(80px);animation:floatBG 12s ease-in-out infinite alternate;pointer-events:none}
@keyframes floatBG{from{transform:translate(-20px,-20px)}to{transform:translate(20px,20px)}}
#header{backdrop-filter:blur(16px);background:rgba(12,12,20,.75)!important;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.card{border-radius:12px;isolation:isolate;transition:.35s}
.card::before{content:"";position:absolute;inset:-150%;background:conic-gradient(from 0deg,transparent,rgba(108,99,255,.8),rgba(180,120,255,.9),transparent);animation:rotateSweep 5s linear infinite;z-index:-2}
.card::after{content:"";position:absolute;inset:2px;background:#111118;border-radius:10px;z-index:-1}
@keyframes rotateSweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#timer-fill{background:linear-gradient(90deg,#6c63ff,#8d7bff,#b18cff,#6c63ff);background-size:300% 100%;animation:timerGlow 2s linear infinite}
@keyframes timerGlow{0%{background-position:0%}100%{background-position:300%}}

/* Featured Projects card type */
.project-card {
  cursor: pointer;
  justify-content: flex-start;
}

.project-image {
  flex: 1;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #333350;
  background-color: #0d0d18;
  background-size: cover;
  background-position: center;
  image-rendering: pixelated;
}

.project-title {
  margin-top: 8px;
  font-size: 14px;
  font-weight: 800;
  color: #e0e0e8;
}

.project-desc {
  margin-top: 2px;
  font-size: 10px;
  color: #9a9ac0;
}

.visit-btn {
  display: block;
  text-align: center;
  margin-top: 8px;
  background: #6c63ff;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 0;
  border-radius: 6px;
  text-decoration: none;
  transition: background 0.15s;
}

.visit-btn:hover { background: #574fe0; }

</style>
</head>
<body>

<div id="header">
  <div class="title">📺 Ad Feed</div>
  <div id="controls">
    <span id="speed-label">5s</span>

    <button id="btn-pause">⏸</button>
    <button id="btn-manage">⚙</button>
  </div>
</div>

<div id="feed">
  <div id="feed-inner"></div>
  <div id="manage-panel">
    <h3>Channels</h3>
    <div id="channel-list"></div>
    <div id="add-row">
      <input id="add-url" placeholder="YouTube embed URL or site URL" />
      <button id="add-btn">Add</button>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="dots" id="dots"></div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div id="counter">1/1</div>
</div>

channels.push(...featuredProjects);


let current = 0;
let paused = false;
let interval = 5000;
let timer = null;
let fillTimer = null;

const feedInner = document.getElementById('feed-inner');
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');
const timerFill = document.getElementById('timer-fill');
const managePanel = document.getElementById('manage-panel');
const channelList = document.getElementById('channel-list');
const btnPause = document.getElementById('btn-pause');
const btnManage = document.getElementById('btn-manage');

function activeChannels() {
  return channels.filter(c => c.enabled);
}

function buildFeed() {
  const active = activeChannels();
  feedInner.innerHTML = '';
  dotsEl.innerHTML = '';

  active.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    if (ch.type === 'project') {
      card.innerHTML = `
        <div class="card-content project-card">
          <div class="card-brand">FEATURED PROJECT</div>
          <div class="project-image" style="background-image:url('${ch.image}')"></div>
          <div class="project-title">${ch.name}</div>
          <div class="project-desc">${ch.tag}</div>
          <a class="visit-btn" href="${ch.link}" target="_blank" rel="noopener noreferrer">Visit Site</a>
        </div>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('.visit-btn')) return; // let the anchor handle its own click
        window.open(ch.link, '_blank', 'noopener');
      });
    } else {
      card.innerHTML = `
        <div class="card-content">
          <div class="card-brand">${ch.name}</div>
          <div class="card-embed">
            <iframe src="${ch.url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
          <div class="card-label">
            <span class="card-tag">${ch.tag}</span>
          </div>
        </div>
      `;
    }
    feedInner.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });

  if (current >= active.length) current = 0;
  goTo(current, false);
}

function goTo(idx, animate = true) {
  const active = activeChannels();
  if (!active.length) return;
  current = idx;
  const h = feedInner.parentElement.clientHeight;
  feedInner.style.transition = animate ? 'transform 0.5s ease' : 'none';
  feedInner.style.transform = `translateY(-${current * h}px)`;

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
  counter.textContent = `${current + 1}/${active.length}`;
  resetTimerBar();
}

function resetTimerBar() {
  timerFill.style.transition = 'none';
  timerFill.style.width = '0%';
  requestAnimationFrame(() => {
    timerFill.style.transition = `width ${interval}ms linear`;
    timerFill.style.width = '100%';
  });
}

function next() {
  const active = activeChannels();
  if (!active.length) return;
  goTo((current + 1) % active.length);
}

function startAuto() {
  clearInterval(timer);
  if (!paused) {
    timer = setInterval(next, interval);
    resetTimerBar();
  }
}

btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶' : '⏸';
  btnPause.classList.toggle('active', paused);
  if (paused) {
    clearInterval(timer);
    timerFill.style.transition = 'none';
  } else {
    startAuto();
  }
});

document.getElementById('btn-faster').addEventListener('click', () => {
  interval = Math.max(2000, interval - 1000);
  document.getElementById('speed-label').textContent = (interval/1000) + 's';
  startAuto();
});

document.getElementById('btn-slower').addEventListener('click', () => {
  interval = Math.min(30000, interval + 1000);
  document.getElementById('speed-label').textContent = (interval/1000) + 's';
  startAuto();
});

// Swipe support
let startY = 0;
feedInner.addEventListener('touchstart', e => startY = e.touches[0].clientY);
feedInner.addEventListener('touchend', e => {
  const dy = startY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) dy > 0 ? next() : goTo(Math.max(0, current - 1));
});

// Manage panel
btnManage.addEventListener('click', () => {
  const open = managePanel.classList.toggle('open');
  btnManage.classList.toggle('active', open);
  if (open) renderManage();
});

function renderManage() {
  channelList.innerHTML = '';
  channels.forEach((ch, i) => {
    const row = document.createElement('div');
    row.className = 'channel-row';
    row.innerHTML = `
      <label>${ch.name}</label>
      <span>${ch.tag}</span>
      <div class="toggle ${ch.enabled ? 'on' : ''}" data-idx="${i}"></div>
    `;
    channelList.appendChild(row);
  });

  channelList.querySelectorAll('.toggle').forEach(t => {
    t.addEventListener('click', () => {
      const idx = parseInt(t.dataset.idx);
      channels[idx].enabled = !channels[idx].enabled;
      t.classList.toggle('on', channels[idx].enabled);
      buildFeed();
      startAuto();
    });
  });
}

document.getElementById('add-btn').addEventListener('click', () => {
  const url = document.getElementById('add-url').value.trim();
  if (!url) return;
  channels.push({ name: 'Custom', tag: 'User Added', url, enabled: true });
  document.getElementById('add-url').value = '';
  buildFeed();
  renderManage();
  startAuto();
});


function saveState(){localStorage.setItem('adfeed-state',JSON.stringify({channels,interval,current}))}
const _goTo=goTo;goTo=function(i,a=true){_goTo(i,a);saveState()}
const _build=buildFeed;buildFeed=function(){try{let s=JSON.parse(localStorage.getItem('adfeed-state'));if(s){if(s.channels) s.channels.forEach((c,i)=>channels[i]&&Object.assign(channels[i],c));if(s.interval) interval=s.interval;if(s.current!=null) current=s.current;document.getElementById('speed-label').textContent=(interval/1000)+'s';}}catch(e){} _build();}

// Init
buildFeed();
startAuto();
</script>
