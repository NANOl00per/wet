<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WET – Soundscape Engine</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050814;
  color: #e0f7ff;
  overflow: hidden;
}

/* Rain effect */
.rain {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/3R6Xk8f.png');
  animation: rain 0.3s linear infinite;
  opacity: 0.15;
}

@keyframes rain {
  from { background-position: 0 0; }
  to { background-position: 0 100px; }
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 20vh;
}

h1 {
  font-size: 48px;
  letter-spacing: 2px;
}

p {
  opacity: 0.7;
}

input {
  width: 60%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  margin-left: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00c2ff;
  color: black;
  font-weight: bold;
}

audio {
  margin-top: 30px;
  width: 70%;
}

.glow {
  text-shadow: 0 0 20px #00c2ff;
}
</style>
</head>

<body>

<div class="rain"></div>

<div class="container">
  <h1 class="glow">WET</h1>
  <p>Immersive Soundscape Engine</p>

  <input id="audioURL" placeholder="Paste audio link here..." />
  <button onclick="loadAudio()">Play</button>

  <div>
    <audio id="player" controls></audio>
  </div>
</div>

<script>
function loadAudio() {
  const url = document.getElementById("audioURL").value;
  const player = document.getElementById("player");

  if (!url) return;

  player.src = url;
  player.play();
}
</script>

</body>
</html>
